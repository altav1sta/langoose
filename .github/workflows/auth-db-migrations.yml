name: Auth DB Migrations

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: GitHub environment to run against
        required: true
        type: choice
        options:
          - staging
          - production
  workflow_call:
    inputs:
      target_environment:
        description: GitHub environment to run against
        required: true
        type: string
    secrets:
      AUTH_DATABASE:
        required: true

run-name: Auth DB Migrations (${{ inputs.target_environment }})

permissions:
  contents: read

concurrency:
  group: auth-db-migrations-${{ inputs.target_environment }}
  cancel-in-progress: false

jobs:
  apply-auth-migrations:
    name: Apply Auth Migrations
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}

    env:
      AUTH_DATABASE: ${{ secrets.AUTH_DATABASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Build DbTool Docker image
        run: |
          docker build \
            -f apps/api/src/Langoose.DbTool/Dockerfile \
            -t langoose-dbtool:${{ github.sha }} \
            .

      - name: Apply auth database migrations
        run: |
          docker run --rm \
            -e ConnectionStrings__AuthDatabase="${AUTH_DATABASE}" \
            langoose-dbtool:${{ github.sha }} \
            dotnet /src/apps/api/src/Langoose.DbTool/bin/Release/net10.0/Langoose.DbTool.dll apply-auth-migrations
