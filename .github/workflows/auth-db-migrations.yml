name: Auth DB Migrations

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: GitHub environment to run against
        required: true
        type: choice
        options:
          - staging
          - production
  workflow_call:
    inputs:
      target_environment:
        description: GitHub environment to run against
        required: true
        type: string
    secrets:
      AUTH_DATABASE:
        required: true

run-name: Auth DB Migrations (${{ inputs.target_environment }})

permissions:
  contents: read

concurrency:
  group: auth-db-migrations-${{ inputs.target_environment }}
  cancel-in-progress: false

jobs:
  build-dbtool-image:
    name: Build DbTool Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Build DbTool Docker image
        run: |
          mkdir -p .artifacts/dbtool-image
          docker build \
            -f apps/api/src/Langoose.DbTool/Dockerfile \
            -t langoose-dbtool:${{ github.sha }} \
            .
          docker save langoose-dbtool:${{ github.sha }} | gzip > .artifacts/dbtool-image/langoose-dbtool.tar.gz

      - name: Upload DbTool image artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbtool-image
          path: .artifacts/dbtool-image
          if-no-files-found: error

  build-auth-script:
    name: Build Auth Migration Script
    runs-on: ubuntu-latest
    needs: build-dbtool-image

    steps:
      - name: Download DbTool image artifact
        uses: actions/download-artifact@v4
        with:
          name: dbtool-image
          path: .artifacts/dbtool-image

      - name: Load DbTool Docker image
        run: docker load --input .artifacts/dbtool-image/langoose-dbtool.tar.gz

      - name: Build auth migration script
        run: |
          mkdir -p .artifacts/auth-db-migrations
          docker run --rm \
            -v "${{ github.workspace }}/.artifacts:/artifacts" \
            langoose-dbtool:${{ github.sha }} \
            bash -lc "dotnet ef migrations script \
              --project apps/api/src/Langoose.Auth.Data/Langoose.Auth.Data.csproj \
              --startup-project apps/api/src/Langoose.DbTool/Langoose.DbTool.csproj \
              --context AuthDbContext \
              --idempotent \
              --output /artifacts/auth-db-migrations/auth.sql \
              --configuration Release \
              --no-build"

      - name: Upload auth migration script artifact
        uses: actions/upload-artifact@v4
        with:
          name: auth-db-migrations
          path: .artifacts/auth-db-migrations
          if-no-files-found: error

  apply-auth-migrations:
    name: Apply Auth Migrations
    runs-on: ubuntu-latest
    needs: build-auth-script
    environment: ${{ inputs.target_environment }}

    env:
      AUTH_DATABASE: ${{ secrets.AUTH_DATABASE }}

    steps:
      - name: Download DbTool image artifact
        uses: actions/download-artifact@v4
        with:
          name: dbtool-image
          path: .artifacts/dbtool-image

      - name: Load DbTool Docker image
        run: docker load --input .artifacts/dbtool-image/langoose-dbtool.tar.gz

      - name: Download auth migration script artifact
        uses: actions/download-artifact@v4
        with:
          name: auth-db-migrations
          path: .artifacts/auth-db-migrations

      - name: Apply auth database migrations
        run: |
          docker run --rm \
            -e AUTH_DATABASE="${AUTH_DATABASE}" \
            -v "${{ github.workspace }}/.artifacts:/artifacts" \
            langoose-dbtool:${{ github.sha }} \
            bash -lc 'psql "$AUTH_DATABASE" -v ON_ERROR_STOP=1 -f /artifacts/auth-db-migrations/auth.sql'
