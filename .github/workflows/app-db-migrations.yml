name: App DB Migrations

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: GitHub environment to run against
        required: true
        type: choice
        options:
          - staging
          - production
  workflow_call:
    inputs:
      target_environment:
        description: GitHub environment to run against
        required: true
        type: string
    secrets:
      APP_DATABASE:
        required: true

run-name: App DB Migrations (${{ inputs.target_environment }})

permissions:
  contents: read

concurrency:
  group: app-db-migrations-${{ inputs.target_environment }}
  cancel-in-progress: false

jobs:
  apply-app-migrations:
    name: Apply App Migrations
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}

    env:
      APP_DATABASE: ${{ secrets.APP_DATABASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Build DbTool Docker image
        run: |
          docker build \
            -f apps/api/src/Langoose.DbTool/Dockerfile \
            -t langoose-dbtool:${{ github.sha }} \
            .

      - name: Apply app database migrations
        run: |
          docker run --rm \
            -e ConnectionStrings__AppDatabase="${APP_DATABASE}" \
            langoose-dbtool:${{ github.sha }} \
            dotnet /src/apps/api/src/Langoose.DbTool/bin/Release/net10.0/Langoose.DbTool.dll apply-app-migrations
