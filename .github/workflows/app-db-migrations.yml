name: App DB Migrations

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: GitHub environment to run against
        required: true
        type: choice
        options:
          - staging
          - production
  workflow_call:
    inputs:
      target_environment:
        description: GitHub environment to run against
        required: true
        type: string
    secrets:
      APP_DATABASE:
        required: true

run-name: App DB Migrations (${{ inputs.target_environment }})

permissions:
  contents: read

concurrency:
  group: app-db-migrations-${{ inputs.target_environment }}
  cancel-in-progress: false

jobs:
  build-dbtool-image:
    name: Build DbTool Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Build DbTool Docker image
        run: |
          mkdir -p .artifacts/dbtool-image
          docker build \
            -f apps/api/src/Langoose.DbTool/Dockerfile \
            -t langoose-dbtool:${{ github.sha }} \
            .
          docker save langoose-dbtool:${{ github.sha }} | gzip > .artifacts/dbtool-image/langoose-dbtool.tar.gz

      - name: Upload DbTool image artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbtool-image
          path: .artifacts/dbtool-image
          if-no-files-found: error

  build-app-script:
    name: Build App Migration Script
    runs-on: ubuntu-latest
    needs: build-dbtool-image

    steps:
      - name: Download DbTool image artifact
        uses: actions/download-artifact@v4
        with:
          name: dbtool-image
          path: .artifacts/dbtool-image

      - name: Load DbTool Docker image
        run: docker load --input .artifacts/dbtool-image/langoose-dbtool.tar.gz

      - name: Build app migration script
        run: |
          mkdir -p .artifacts/app-db-migrations
          docker run --rm \
            -v "${{ github.workspace }}/.artifacts:/artifacts" \
            langoose-dbtool:${{ github.sha }} \
            bash -lc "dotnet ef migrations script \
              --project apps/api/src/Langoose.Data/Langoose.Data.csproj \
              --startup-project apps/api/src/Langoose.DbTool/Langoose.DbTool.csproj \
              --context AppDbContext \
              --idempotent \
              --output /artifacts/app-db-migrations/app.sql \
              --configuration Release \
              --no-build"

      - name: Upload app migration script artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-db-migrations
          path: .artifacts/app-db-migrations
          if-no-files-found: error

  apply-app-migrations:
    name: Apply App Migrations
    runs-on: ubuntu-latest
    needs: build-app-script
    environment: ${{ inputs.target_environment }}

    env:
      APP_DATABASE: ${{ secrets.APP_DATABASE }}

    steps:
      - name: Download DbTool image artifact
        uses: actions/download-artifact@v4
        with:
          name: dbtool-image
          path: .artifacts/dbtool-image

      - name: Load DbTool Docker image
        run: docker load --input .artifacts/dbtool-image/langoose-dbtool.tar.gz

      - name: Download app migration script artifact
        uses: actions/download-artifact@v4
        with:
          name: app-db-migrations
          path: .artifacts/app-db-migrations

      - name: Apply app database migrations
        run: |
          docker run --rm \
            -e APP_DATABASE="${APP_DATABASE}" \
            -v "${{ github.workspace }}/.artifacts:/artifacts" \
            langoose-dbtool:${{ github.sha }} \
            bash -lc 'psql "$APP_DATABASE" -v ON_ERROR_STOP=1 -f /artifacts/app-db-migrations/app.sql'
