name: Deploy Environment

on:
  workflow_call:
    inputs:
      target_environment:
        required: true
        type: string
      deploy_api:
        required: false
        type: boolean
        default: true
      deploy_worker:
        required: false
        type: boolean
        default: true
      deploy_web:
        required: false
        type: boolean
        default: true
      run_migrations_app:
        required: false
        type: boolean
        default: true
      run_migrations_auth:
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      target_environment:
        description: Target environment to deploy
        required: true
        type: choice
        default: production
        options:
          - staging
          - production
      deploy_api:
        description: Deploy the API service
        required: false
        type: boolean
        default: true
      deploy_worker:
        description: Deploy the Worker service
        required: false
        type: boolean
        default: true
      deploy_web:
        description: Deploy the web app
        required: false
        type: boolean
        default: true
      run_migrations_app:
        description: Apply app database migrations
        required: false
        type: boolean
        default: true
      run_migrations_auth:
        description: Apply auth database migrations
        required: false
        type: boolean
        default: true

run-name: Deploy ${{ inputs.target_environment }}

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.target_environment }}
  cancel-in-progress: false

jobs:
  resolve-context:
    name: Resolve Deploy Context
    runs-on: ubuntu-latest
    outputs:
      target_environment: ${{ steps.resolve.outputs.target_environment }}
      source_sha: ${{ steps.resolve.outputs.source_sha }}
      deploy_api: ${{ steps.resolve.outputs.deploy_api }}
      deploy_worker: ${{ steps.resolve.outputs.deploy_worker }}
      deploy_web: ${{ steps.resolve.outputs.deploy_web }}
      run_migrations_app: ${{ steps.resolve.outputs.run_migrations_app }}
      run_migrations_auth: ${{ steps.resolve.outputs.run_migrations_auth }}
      build_dbtool: ${{ steps.resolve.outputs.build_dbtool }}
      should_run: ${{ steps.resolve.outputs.should_run }}

    steps:
      - name: Resolve deploy context
        id: resolve
        shell: bash
        run: |
          set -eu

          echo "target_environment=${{ inputs.target_environment }}" >> "$GITHUB_OUTPUT"
          echo "source_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "deploy_api=${{ inputs.deploy_api }}" >> "$GITHUB_OUTPUT"
          echo "deploy_worker=${{ inputs.deploy_worker }}" >> "$GITHUB_OUTPUT"
          echo "deploy_web=${{ inputs.deploy_web }}" >> "$GITHUB_OUTPUT"
          echo "run_migrations_app=${{ inputs.run_migrations_app }}" >> "$GITHUB_OUTPUT"
          echo "run_migrations_auth=${{ inputs.run_migrations_auth }}" >> "$GITHUB_OUTPUT"

          # DbTool image only exists to feed migration jobs. Skip building
          # it entirely when neither migration lane is going to use it.
          if [ "${{ inputs.run_migrations_app }}" = "true" ] || [ "${{ inputs.run_migrations_auth }}" = "true" ]; then
            echo "build_dbtool=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_dbtool=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "${{ inputs.deploy_api }}" = "true" ] \
              || [ "${{ inputs.deploy_worker }}" = "true" ] \
              || [ "${{ inputs.deploy_web }}" = "true" ] \
              || [ "${{ inputs.run_migrations_app }}" = "true" ] \
              || [ "${{ inputs.run_migrations_auth }}" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  validate-config:
    name: Validate Deploy Configuration
    runs-on: ubuntu-latest
    needs: resolve-context
    if: needs.resolve-context.outputs.should_run == 'true'
    environment: ${{ needs.resolve-context.outputs.target_environment }}

    steps:
      - name: Validate required secrets and variables
        env:
          DEPLOY_API: ${{ needs.resolve-context.outputs.deploy_api }}
          DEPLOY_WORKER: ${{ needs.resolve-context.outputs.deploy_worker }}
          DEPLOY_WEB: ${{ needs.resolve-context.outputs.deploy_web }}
          RUN_MIGRATIONS_APP: ${{ needs.resolve-context.outputs.run_migrations_app }}
          RUN_MIGRATIONS_AUTH: ${{ needs.resolve-context.outputs.run_migrations_auth }}
          AUTH_DATABASE: ${{ secrets.AUTH_DATABASE }}
          APP_DATABASE: ${{ secrets.APP_DATABASE }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          COOLIFY_URL: ${{ vars.COOLIFY_URL }}
          COOLIFY_API_UUID: ${{ vars.COOLIFY_API_UUID }}
          COOLIFY_WORKER_UUID: ${{ vars.COOLIFY_WORKER_UUID }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: |
          set -eu

          if [ "$RUN_MIGRATIONS_AUTH" = "true" ] && [ -z "$AUTH_DATABASE" ]; then
            echo "Missing AUTH_DATABASE secret for auth database migrations." >&2
            exit 1
          fi

          if [ "$RUN_MIGRATIONS_APP" = "true" ] && [ -z "$APP_DATABASE" ]; then
            echo "Missing APP_DATABASE secret for app database migrations." >&2
            exit 1
          fi

          if [ "$DEPLOY_API" = "true" ] || [ "$DEPLOY_WORKER" = "true" ]; then
            if [ -z "$COOLIFY_API_TOKEN" ]; then
              echo "Missing COOLIFY_API_TOKEN secret for Coolify deployment." >&2
              exit 1
            fi
            if [ -z "$COOLIFY_URL" ]; then
              echo "Missing COOLIFY_URL environment variable for Coolify deployment." >&2
              exit 1
            fi
          fi

          if [ "$DEPLOY_API" = "true" ] && [ -z "$COOLIFY_API_UUID" ]; then
            echo "Missing COOLIFY_API_UUID environment variable for Coolify deployment." >&2
            exit 1
          fi

          if [ "$DEPLOY_WORKER" = "true" ] && [ -z "$COOLIFY_WORKER_UUID" ]; then
            echo "Missing COOLIFY_WORKER_UUID environment variable for Coolify deployment." >&2
            exit 1
          fi

          if [ "$DEPLOY_WEB" = "true" ] && [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing VERCEL_TOKEN secret for Vercel deployment." >&2
            exit 1
          fi

          if [ "$DEPLOY_WEB" = "true" ] && [ -z "$VERCEL_ORG_ID" ]; then
            echo "Missing VERCEL_ORG_ID environment variable for Vercel deployment." >&2
            exit 1
          fi

          if [ "$DEPLOY_WEB" = "true" ] && [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing VERCEL_PROJECT_ID environment variable for Vercel deployment." >&2
            exit 1
          fi

  build-dbtool-image:
    name: Build DbTool Image
    runs-on: ubuntu-latest
    needs:
      - resolve-context
      - validate-config
    if: needs.resolve-context.outputs.build_dbtool == 'true'
    environment: ${{ needs.resolve-context.outputs.target_environment }}

    steps:
      - name: Checkout deployment ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-context.outputs.source_sha }}

      - name: Build DbTool Docker image
        run: |
          mkdir -p .artifacts/dbtool-image
          docker build \
            -f apps/api/src/Langoose.DbTool/Dockerfile \
            -t langoose-dbtool:${{ github.sha }} \
            .
          docker save langoose-dbtool:${{ github.sha }} | gzip > .artifacts/dbtool-image/langoose-dbtool.tar.gz

      - name: Upload DbTool image artifact
        uses: actions/upload-artifact@v6
        with:
          name: dbtool-image
          path: .artifacts/dbtool-image
          if-no-files-found: error

  auth-db-migrations:
    name: Auth DB Migrations
    runs-on: ubuntu-latest
    needs:
      - resolve-context
      - build-dbtool-image
    if: needs.resolve-context.outputs.run_migrations_auth == 'true'
    environment: ${{ needs.resolve-context.outputs.target_environment }}

    env:
      AUTH_DATABASE: ${{ secrets.AUTH_DATABASE }}

    steps:
      - name: Download DbTool image artifact
        uses: actions/download-artifact@v8
        with:
          name: dbtool-image
          path: .artifacts/dbtool-image

      - name: Load DbTool Docker image
        run: docker load --input .artifacts/dbtool-image/langoose-dbtool.tar.gz

      - name: Apply auth database migrations
        run: |
          docker run --rm \
            -e ConnectionStrings__AuthDatabase="${AUTH_DATABASE}" \
            langoose-dbtool:${{ github.sha }} \
            dotnet /src/apps/api/src/Langoose.DbTool/bin/Release/net10.0/Langoose.DbTool.dll apply-auth-migrations

  app-db-migrations:
    name: App DB Migrations
    runs-on: ubuntu-latest
    needs:
      - resolve-context
      - build-dbtool-image
    if: needs.resolve-context.outputs.run_migrations_app == 'true'
    environment: ${{ needs.resolve-context.outputs.target_environment }}

    env:
      APP_DATABASE: ${{ secrets.APP_DATABASE }}

    steps:
      - name: Download DbTool image artifact
        uses: actions/download-artifact@v8
        with:
          name: dbtool-image
          path: .artifacts/dbtool-image

      - name: Load DbTool Docker image
        run: docker load --input .artifacts/dbtool-image/langoose-dbtool.tar.gz

      - name: Apply app database migrations
        run: |
          docker run --rm \
            -e ConnectionStrings__AppDatabase="${APP_DATABASE}" \
            langoose-dbtool:${{ github.sha }} \
            dotnet /src/apps/api/src/Langoose.DbTool/bin/Release/net10.0/Langoose.DbTool.dll apply-app-migrations

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs:
      - resolve-context
      - validate-config
      - auth-db-migrations
      - app-db-migrations
    if: >-
      !cancelled()
      && !contains(needs.*.result, 'failure')
      && needs.resolve-context.outputs.deploy_api == 'true'
    environment: ${{ needs.resolve-context.outputs.target_environment }}

    steps:
      - name: Checkout deployment ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-context.outputs.source_sha }}

      - name: Trigger API deploy on Coolify and wait
        uses: ./.github/actions/coolify-deploy
        with:
          url: ${{ vars.COOLIFY_URL }}
          token: ${{ secrets.COOLIFY_API_TOKEN }}
          uuid: ${{ vars.COOLIFY_API_UUID }}

  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs:
      - resolve-context
      - validate-config
      - auth-db-migrations
      - app-db-migrations
    if: >-
      !cancelled()
      && !contains(needs.*.result, 'failure')
      && needs.resolve-context.outputs.deploy_worker == 'true'
    environment: ${{ needs.resolve-context.outputs.target_environment }}

    steps:
      - name: Checkout deployment ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-context.outputs.source_sha }}

      - name: Trigger Worker deploy on Coolify and wait
        uses: ./.github/actions/coolify-deploy
        with:
          url: ${{ vars.COOLIFY_URL }}
          token: ${{ secrets.COOLIFY_API_TOKEN }}
          uuid: ${{ vars.COOLIFY_WORKER_UUID }}

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs:
      - resolve-context
      - validate-config
      - deploy-api
    if: >-
      !cancelled()
      && !contains(needs.*.result, 'failure')
      && needs.resolve-context.outputs.deploy_web == 'true'
    environment: ${{ needs.resolve-context.outputs.target_environment }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout deployment ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-context.outputs.source_sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        env:
          VERCEL_ENVIRONMENT: ${{ needs.resolve-context.outputs.target_environment == 'production' && 'production' || 'preview' }}
        run: vercel pull --yes --environment="$VERCEL_ENVIRONMENT" --token="$VERCEL_TOKEN"

      - name: Deploy web to Vercel
        env:
          TARGET_ENVIRONMENT: ${{ needs.resolve-context.outputs.target_environment }}
        shell: bash
        run: |
          set -eu

          if [ "$TARGET_ENVIRONMENT" = "production" ]; then
            vercel deploy --prod --yes --token="$VERCEL_TOKEN"
          else
            vercel deploy --yes --token="$VERCEL_TOKEN"
          fi
