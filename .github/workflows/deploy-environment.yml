name: Deploy Environment

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      target_environment:
        description: Target environment to deploy
        required: true
        type: choice
        default: production
        options:
          - staging
          - production
      deploy_api:
        description: Deploy the API service
        required: false
        type: boolean
        default: true
      deploy_web:
        description: Deploy the web app
        required: false
        type: boolean
        default: true

run-name: Deploy ${{ github.event_name == 'workflow_run' && 'staging' || inputs.target_environment }}

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.event_name == 'workflow_run' && 'staging' || inputs.target_environment }}
  cancel-in-progress: false

jobs:
  resolve-context:
    name: Resolve Deploy Context
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main')
    outputs:
      target_environment: ${{ steps.resolve_manual.outputs.target_environment || steps.resolve_workflow_run.outputs.target_environment }}
      source_sha: ${{ steps.resolve_manual.outputs.source_sha || steps.resolve_workflow_run.outputs.source_sha }}
      deploy_api: ${{ steps.resolve_manual.outputs.deploy_api || steps.resolve_workflow_run.outputs.deploy_api }}
      deploy_web: ${{ steps.resolve_manual.outputs.deploy_web || steps.resolve_workflow_run.outputs.deploy_web }}
      should_run: ${{ steps.resolve_manual.outputs.should_run || steps.resolve_workflow_run.outputs.should_run }}

    steps:
      - name: Resolve manual dispatch context
        id: resolve_manual
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -eu

          echo "target_environment=${{ inputs.target_environment }}" >> "$GITHUB_OUTPUT"
          echo "source_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "deploy_api=${{ inputs.deploy_api }}" >> "$GITHUB_OUTPUT"
          echo "deploy_web=${{ inputs.deploy_web }}" >> "$GITHUB_OUTPUT"

          if [ "${{ inputs.deploy_api }}" = "true" ] || [ "${{ inputs.deploy_web }}" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve successful CI push context
        id: resolve_workflow_run
        if: github.event_name == 'workflow_run'
        shell: bash
        run: |
          set -eu

          echo "target_environment=staging" >> "$GITHUB_OUTPUT"
          echo "source_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          echo "deploy_api=true" >> "$GITHUB_OUTPUT"
          echo "deploy_web=true" >> "$GITHUB_OUTPUT"
          echo "should_run=true" >> "$GITHUB_OUTPUT"

  validate-config:
    name: Validate Deploy Configuration
    runs-on: ubuntu-latest
    needs: resolve-context
    if: needs.resolve-context.outputs.should_run == 'true'
    environment: ${{ needs.resolve-context.outputs.target_environment }}

    steps:
      - name: Validate required secrets and variables
        env:
          DEPLOY_API: ${{ needs.resolve-context.outputs.deploy_api }}
          DEPLOY_WEB: ${{ needs.resolve-context.outputs.deploy_web }}
          AUTH_DATABASE: ${{ secrets.AUTH_DATABASE }}
          APP_DATABASE: ${{ secrets.APP_DATABASE }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_API_SERVICE: ${{ vars.RAILWAY_API_SERVICE }}
          RAILWAY_ENVIRONMENT: ${{ vars.RAILWAY_ENVIRONMENT }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: |
          set -eu

          if [ -z "$AUTH_DATABASE" ]; then
            echo "Missing AUTH_DATABASE secret for database migrations." >&2
            exit 1
          fi

          if [ -z "$APP_DATABASE" ]; then
            echo "Missing APP_DATABASE secret for database migrations." >&2
            exit 1
          fi

          if [ "$DEPLOY_API" = "true" ] && [ -z "$RAILWAY_TOKEN" ]; then
            echo "Missing RAILWAY_TOKEN secret for Railway deployment." >&2
            exit 1
          fi

          if [ "$DEPLOY_API" = "true" ] && [ -z "$RAILWAY_PROJECT_ID" ]; then
            echo "Missing RAILWAY_PROJECT_ID environment variable for Railway deployment." >&2
            exit 1
          fi

          if [ "$DEPLOY_API" = "true" ] && [ -z "$RAILWAY_API_SERVICE" ]; then
            echo "Missing RAILWAY_API_SERVICE environment variable for Railway deployment." >&2
            exit 1
          fi

          if [ "$DEPLOY_API" = "true" ] && [ -z "$RAILWAY_ENVIRONMENT" ]; then
            echo "Missing RAILWAY_ENVIRONMENT environment variable for Railway deployment." >&2
            exit 1
          fi

          if [ "$DEPLOY_WEB" = "true" ] && [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing VERCEL_TOKEN secret for Vercel deployment." >&2
            exit 1
          fi

          if [ "$DEPLOY_WEB" = "true" ] && [ -z "$VERCEL_ORG_ID" ]; then
            echo "Missing VERCEL_ORG_ID environment variable for Vercel deployment." >&2
            exit 1
          fi

          if [ "$DEPLOY_WEB" = "true" ] && [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing VERCEL_PROJECT_ID environment variable for Vercel deployment." >&2
            exit 1
          fi

  build-dbtool-image:
    name: Build DbTool Image
    runs-on: ubuntu-latest
    needs:
      - resolve-context
      - validate-config
    if: needs.resolve-context.outputs.should_run == 'true'
    environment: ${{ needs.resolve-context.outputs.target_environment }}

    steps:
      - name: Checkout deployment ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-context.outputs.source_sha }}

      - name: Build DbTool Docker image
        run: |
          mkdir -p .artifacts/dbtool-image
          docker build \
            -f apps/api/src/Langoose.DbTool/Dockerfile \
            -t langoose-dbtool:${{ github.sha }} \
            .
          docker save langoose-dbtool:${{ github.sha }} | gzip > .artifacts/dbtool-image/langoose-dbtool.tar.gz

      - name: Upload DbTool image artifact
        uses: actions/upload-artifact@v6
        with:
          name: dbtool-image
          path: .artifacts/dbtool-image
          if-no-files-found: error

  auth-db-migrations:
    name: Auth DB Migrations
    runs-on: ubuntu-latest
    needs:
      - resolve-context
      - build-dbtool-image
    if: needs.resolve-context.outputs.should_run == 'true'
    environment: ${{ needs.resolve-context.outputs.target_environment }}

    env:
      AUTH_DATABASE: ${{ secrets.AUTH_DATABASE }}

    steps:
      - name: Download DbTool image artifact
        uses: actions/download-artifact@v8
        with:
          name: dbtool-image
          path: .artifacts/dbtool-image

      - name: Load DbTool Docker image
        run: docker load --input .artifacts/dbtool-image/langoose-dbtool.tar.gz

      - name: Apply auth database migrations
        run: |
          docker run --rm \
            -e ConnectionStrings__AuthDatabase="${AUTH_DATABASE}" \
            langoose-dbtool:${{ github.sha }} \
            dotnet /src/apps/api/src/Langoose.DbTool/bin/Release/net10.0/Langoose.DbTool.dll apply-auth-migrations

  app-db-migrations:
    name: App DB Migrations
    runs-on: ubuntu-latest
    needs:
      - resolve-context
      - build-dbtool-image
    if: needs.resolve-context.outputs.should_run == 'true'
    environment: ${{ needs.resolve-context.outputs.target_environment }}

    env:
      APP_DATABASE: ${{ secrets.APP_DATABASE }}

    steps:
      - name: Download DbTool image artifact
        uses: actions/download-artifact@v8
        with:
          name: dbtool-image
          path: .artifacts/dbtool-image

      - name: Load DbTool Docker image
        run: docker load --input .artifacts/dbtool-image/langoose-dbtool.tar.gz

      - name: Apply app database migrations
        run: |
          docker run --rm \
            -e ConnectionStrings__AppDatabase="${APP_DATABASE}" \
            langoose-dbtool:${{ github.sha }} \
            dotnet /src/apps/api/src/Langoose.DbTool/bin/Release/net10.0/Langoose.DbTool.dll apply-app-migrations

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs:
      - resolve-context
      - auth-db-migrations
      - app-db-migrations
    if: needs.resolve-context.outputs.deploy_api == 'true'
    environment: ${{ needs.resolve-context.outputs.target_environment }}

    steps:
      - name: Checkout deployment ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-context.outputs.source_sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Deploy API to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_API_SERVICE: ${{ vars.RAILWAY_API_SERVICE }}
          RAILWAY_ENVIRONMENT: ${{ vars.RAILWAY_ENVIRONMENT }}
        run: >
          railway up
          --ci
          --service "$RAILWAY_API_SERVICE"
          --environment "$RAILWAY_ENVIRONMENT"
          --project "$RAILWAY_PROJECT_ID"

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs:
      - resolve-context
      - deploy-api
    if: always() && needs.resolve-context.outputs.deploy_web == 'true' && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    environment: ${{ needs.resolve-context.outputs.target_environment }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout deployment ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-context.outputs.source_sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        env:
          VERCEL_ENVIRONMENT: ${{ needs.resolve-context.outputs.target_environment == 'production' && 'production' || 'preview' }}
        run: vercel pull --yes --environment="$VERCEL_ENVIRONMENT" --token="$VERCEL_TOKEN"

      - name: Deploy web to Vercel
        env:
          TARGET_ENVIRONMENT: ${{ needs.resolve-context.outputs.target_environment }}
        shell: bash
        run: |
          set -eu

          if [ "$TARGET_ENVIRONMENT" = "production" ]; then
            vercel deploy --prod --yes --token="$VERCEL_TOKEN"
          else
            vercel deploy --yes --token="$VERCEL_TOKEN"
          fi
