name: Deploy Environment

on:
  push:
    branches:
      - main
    paths:
      - apps/api/src/**
      - apps/api/NuGet.Config
      - apps/api/Langoose.sln
      - apps/web/**
      - .github/workflows/deploy-environment.yml
  workflow_dispatch:
    inputs:
      target_environment:
        description: Target environment to deploy
        required: true
        type: choice
        default: production
        options:
          - staging
          - production
      deploy_ref:
        description: Optional git ref to deploy. Leave empty to use the manually selected ref.
        required: false
        type: string
      deploy_api:
        description: Deploy the API service
        required: false
        type: boolean
        default: true
      deploy_web:
        description: Deploy the web app
        required: false
        type: boolean
        default: true

run-name: Deploy ${{ github.event_name == 'push' && 'staging' || inputs.target_environment }}

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.event_name == 'push' && 'staging' || inputs.target_environment }}
  cancel-in-progress: false

jobs:
  resolve-context:
    name: Resolve Deploy Context
    runs-on: ubuntu-latest
    outputs:
      target_environment: ${{ steps.resolve.outputs.target_environment }}
      source_ref: ${{ steps.resolve.outputs.source_ref }}
      deploy_api: ${{ steps.resolve.outputs.deploy_api }}
      deploy_web: ${{ steps.resolve.outputs.deploy_web }}

    steps:
      - name: Checkout push context
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve target environment and deployment ref
        id: resolve
        shell: bash
        run: |
          set -eu

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            source_ref="${{ inputs.deploy_ref }}"

            if [ -z "$source_ref" ]; then
              source_ref="${{ github.sha }}"
            fi

            echo "target_environment=${{ inputs.target_environment }}" >> "$GITHUB_OUTPUT"
            echo "source_ref=$source_ref" >> "$GITHUB_OUTPUT"
            echo "deploy_api=${{ inputs.deploy_api }}" >> "$GITHUB_OUTPUT"
            echo "deploy_web=${{ inputs.deploy_web }}" >> "$GITHUB_OUTPUT"
          else
            before_sha="${{ github.event.before }}"
            current_sha="${{ github.sha }}"

            changed_files="$(git diff --name-only "$before_sha" "$current_sha")"

            deploy_api=false
            deploy_web=false

            while IFS= read -r file; do
              [ -z "$file" ] && continue

              case "$file" in
                apps/api/*)
                  deploy_api=true
                  ;;
                apps/web/*)
                  deploy_web=true
                  ;;
                .github/workflows/deploy-environment.yml)
                  deploy_api=true
                  deploy_web=true
                  ;;
              esac
            done <<< "$changed_files"

            echo "target_environment=staging" >> "$GITHUB_OUTPUT"
            echo "source_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "deploy_api=$deploy_api" >> "$GITHUB_OUTPUT"
            echo "deploy_web=$deploy_web" >> "$GITHUB_OUTPUT"
          fi

  validate-config:
    name: Validate Deploy Configuration
    runs-on: ubuntu-latest
    needs: resolve-context
    environment: ${{ needs.resolve-context.outputs.target_environment }}

    steps:
      - name: Validate required secrets and variables
        env:
          AUTH_DATABASE: ${{ secrets.AUTH_DATABASE }}
          APP_DATABASE: ${{ secrets.APP_DATABASE }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_API_SERVICE: ${{ vars.RAILWAY_API_SERVICE }}
        run: |
          set -eu

          if [ -z "$AUTH_DATABASE" ]; then
            echo "Missing AUTH_DATABASE secret for database migrations." >&2
            exit 1
          fi

          if [ -z "$APP_DATABASE" ]; then
            echo "Missing APP_DATABASE secret for database migrations." >&2
            exit 1
          fi

          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "Missing RAILWAY_TOKEN secret for Railway deployment." >&2
            exit 1
          fi

          if [ -z "$RAILWAY_PROJECT_ID" ]; then
            echo "Missing RAILWAY_PROJECT_ID environment variable for Railway deployment." >&2
            exit 1
          fi

          if [ -z "$RAILWAY_API_SERVICE" ]; then
            echo "Missing RAILWAY_API_SERVICE environment variable for Railway deployment." >&2
            exit 1
          fi

          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "Missing VERCEL_DEPLOY_HOOK_URL secret for Vercel deployment." >&2
            exit 1
          fi

  build-dbtool-image:
    name: Build DbTool Image
    runs-on: ubuntu-latest
    needs:
      - resolve-context
      - validate-config
    environment: ${{ needs.resolve-context.outputs.target_environment }}

    steps:
      - name: Checkout deployment ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-context.outputs.source_ref }}

      - name: Build DbTool Docker image
        run: |
          mkdir -p .artifacts/dbtool-image
          docker build \
            -f apps/api/src/Langoose.DbTool/Dockerfile \
            -t langoose-dbtool:${{ github.sha }} \
            .
          docker save langoose-dbtool:${{ github.sha }} | gzip > .artifacts/dbtool-image/langoose-dbtool.tar.gz

      - name: Upload DbTool image artifact
        uses: actions/upload-artifact@v6
        with:
          name: dbtool-image
          path: .artifacts/dbtool-image
          if-no-files-found: error

  auth-db-migrations:
    name: Auth DB Migrations
    runs-on: ubuntu-latest
    needs:
      - resolve-context
      - build-dbtool-image
    environment: ${{ needs.resolve-context.outputs.target_environment }}

    env:
      AUTH_DATABASE: ${{ secrets.AUTH_DATABASE }}

    steps:
      - name: Download DbTool image artifact
        uses: actions/download-artifact@v8
        with:
          name: dbtool-image
          path: .artifacts/dbtool-image

      - name: Load DbTool Docker image
        run: docker load --input .artifacts/dbtool-image/langoose-dbtool.tar.gz

      - name: Apply auth database migrations
        run: |
          docker run --rm \
            -e ConnectionStrings__AuthDatabase="${AUTH_DATABASE}" \
            langoose-dbtool:${{ github.sha }} \
            dotnet /src/apps/api/src/Langoose.DbTool/bin/Release/net10.0/Langoose.DbTool.dll apply-auth-migrations

  app-db-migrations:
    name: App DB Migrations
    runs-on: ubuntu-latest
    needs:
      - resolve-context
      - build-dbtool-image
    environment: ${{ needs.resolve-context.outputs.target_environment }}

    env:
      APP_DATABASE: ${{ secrets.APP_DATABASE }}

    steps:
      - name: Download DbTool image artifact
        uses: actions/download-artifact@v8
        with:
          name: dbtool-image
          path: .artifacts/dbtool-image

      - name: Load DbTool Docker image
        run: docker load --input .artifacts/dbtool-image/langoose-dbtool.tar.gz

      - name: Apply app database migrations
        run: |
          docker run --rm \
            -e ConnectionStrings__AppDatabase="${APP_DATABASE}" \
            langoose-dbtool:${{ github.sha }} \
            dotnet /src/apps/api/src/Langoose.DbTool/bin/Release/net10.0/Langoose.DbTool.dll apply-app-migrations

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs:
      - resolve-context
      - auth-db-migrations
      - app-db-migrations
    if: needs.resolve-context.outputs.deploy_api == 'true'
    environment: ${{ needs.resolve-context.outputs.target_environment }}

    steps:
      - name: Checkout deployment ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-context.outputs.source_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Deploy API to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_API_SERVICE: ${{ vars.RAILWAY_API_SERVICE }}
          TARGET_ENVIRONMENT: ${{ needs.resolve-context.outputs.target_environment }}
        run: >
          railway up apps/api/src/Langoose.Api
          --path-as-root
          --ci
          --service "$RAILWAY_API_SERVICE"
          --environment "$TARGET_ENVIRONMENT"
          --project "$RAILWAY_PROJECT_ID"

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs:
      - resolve-context
      - deploy-api
    if: always() && needs.resolve-context.outputs.deploy_web == 'true' && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    environment: ${{ needs.resolve-context.outputs.target_environment }}

    steps:
      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: curl --fail --silent --show-error --request POST "$VERCEL_DEPLOY_HOOK_URL"
