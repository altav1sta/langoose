name: App Seed

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: GitHub environment to run against
        required: true
        type: choice
        options:
          - staging
          - production
  workflow_call:
    inputs:
      target_environment:
        description: GitHub environment to run against
        required: true
        type: string
    secrets:
      APP_DATABASE:
        required: true

run-name: App Seed (${{ inputs.target_environment }})

permissions:
  contents: read

concurrency:
  group: app-seed-${{ inputs.target_environment }}
  cancel-in-progress: false

jobs:
  build-dbtool-image:
    name: Build DbTool Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Build DbTool Docker image
        run: |
          mkdir -p .artifacts/dbtool-image
          docker build \
            -f apps/api/src/Langoose.DbTool/Dockerfile \
            -t langoose-dbtool:${{ github.sha }} \
            .
          docker save langoose-dbtool:${{ github.sha }} | gzip > .artifacts/dbtool-image/langoose-dbtool.tar.gz

      - name: Upload DbTool image artifact
        uses: actions/upload-artifact@v6
        with:
          name: dbtool-image
          path: .artifacts/dbtool-image
          if-no-files-found: error

  seed-app:
    name: Seed App Database
    runs-on: ubuntu-latest
    needs: build-dbtool-image
    environment: ${{ inputs.target_environment }}

    env:
      ConnectionStrings__AppDatabase: ${{ secrets.APP_DATABASE }}

    steps:
      - name: Download DbTool image artifact
        uses: actions/download-artifact@v8
        with:
          name: dbtool-image
          path: .artifacts/dbtool-image

      - name: Load DbTool Docker image
        run: docker load --input .artifacts/dbtool-image/langoose-dbtool.tar.gz

      - name: Seed app database
        run: |
          docker run --rm \
            -e ConnectionStrings__AppDatabase="${ConnectionStrings__AppDatabase}" \
            langoose-dbtool:${{ github.sha }} \
            dotnet /src/apps/api/src/Langoose.DbTool/bin/Release/net10.0/Langoose.DbTool.dll seed-app
