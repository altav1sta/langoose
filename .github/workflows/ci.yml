name: CI

on:
  pull_request:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  changes:
    name: Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      frontend: ${{ steps.detect.outputs.frontend }}
      e2e: ${{ steps.detect.outputs.e2e }}

    steps:
      - name: Detect relevant changes
        id: detect
        uses: actions/github-script@v8
        with:
          script: |
            const globalForceAllFiles = [
              '.editorconfig',
              '.gitattributes',
              '.github/workflows/ci.yml'
            ];
            const backendPrefixes = [
              'apps/api/'
            ];
            const backendFiles = [
            ];
            const frontendPrefixes = [
              'apps/web/'
            ];
            const frontendFiles = [
            ];
            const e2ePrefixes = [
              'apps/api/',
              'apps/web/',
              'tests/e2e/'
            ];
            const e2eFiles = [
              'compose.yml'
            ];

            if (context.eventName !== 'pull_request') {
              core.setOutput('backend', 'true');
              core.setOutput('frontend', 'true');
              core.setOutput('e2e', 'true');
              return;
            }

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100
              },
              response => response.data.map(file => file.filename)
            );

            const matchesAnyExact = exact =>
              files.some(file => exact.includes(file));
            const includesAny = (prefixes, exact = []) =>
              files.some(file =>
                exact.includes(file) ||
                prefixes.some(prefix => file.startsWith(prefix)));

            const forceAll = matchesAnyExact(globalForceAllFiles);
            const backend = forceAll || includesAny(backendPrefixes, backendFiles);
            const frontend = forceAll || includesAny(frontendPrefixes, frontendFiles);
            const e2e = forceAll || includesAny(e2ePrefixes, e2eFiles);

            core.setOutput('backend', backend ? 'true' : 'false');
            core.setOutput('frontend', frontend ? 'true' : 'false');
            core.setOutput('e2e', e2e ? 'true' : 'false');

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore backend solution
        run: dotnet restore apps/api/Langoose.sln /p:RestoreConfigFile=${{ github.workspace }}/apps/api/NuGet.Config

      - name: Build backend solution
        run: dotnet build apps/api/Langoose.sln --configuration Release --no-restore /p:RestoreConfigFile=${{ github.workspace }}/apps/api/NuGet.Config

  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore unit tests
        run: dotnet restore apps/api/tests/Langoose.Core.UnitTests/Langoose.Core.UnitTests.csproj /p:RestoreConfigFile=${{ github.workspace }}/apps/api/NuGet.Config

      - name: Run backend unit tests
        run: dotnet test apps/api/tests/Langoose.Core.UnitTests/Langoose.Core.UnitTests.csproj --configuration Release --no-restore /p:RestoreConfigFile=${{ github.workspace }}/apps/api/NuGet.Config

  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore integration tests
        run: dotnet restore apps/api/tests/Langoose.Api.IntegrationTests/Langoose.Api.IntegrationTests.csproj /p:RestoreConfigFile=${{ github.workspace }}/apps/api/NuGet.Config

      - name: Run backend integration tests
        run: dotnet test apps/api/tests/Langoose.Api.IntegrationTests/Langoose.Api.IntegrationTests.csproj --configuration Release --no-restore /p:RestoreConfigFile=${{ github.workspace }}/apps/api/NuGet.Config

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.e2e == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Compose auth e2e
        run: docker compose --profile e2e up --build e2e

      - name: Tear down Compose stack
        if: always()
        run: docker compose --profile e2e down --volumes

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - backend-build
      - backend-unit-tests
      - backend-integration-tests
      - frontend-tests
      - frontend-build
      - e2e

    steps:
      - name: Check CI results
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
