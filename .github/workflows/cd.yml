name: CD

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  changes:
    name: Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.detect.outputs.api }}
      worker: ${{ steps.detect.outputs.worker }}
      frontend: ${{ steps.detect.outputs.frontend }}
      migrations_app: ${{ steps.detect.outputs.migrations_app }}
      migrations_auth: ${{ steps.detect.outputs.migrations_auth }}

    steps:
      - name: Detect deploy-relevant changes
        id: detect
        uses: actions/github-script@v8
        with:
          script: |
            const comparison = await github.rest.repos.compareCommitsWithBasehead({
              owner: context.repo.owner,
              repo: context.repo.repo,
              basehead: `${context.payload.before}...${context.payload.after}`
            });

            const files = comparison.data.files.map(f => f.filename);

            if (files.length >= 300) {
              core.info('Compare API returned 300+ files — assuming truncation, deploying everything');
              core.setOutput('api', 'true');
              core.setOutput('worker', 'true');
              core.setOutput('frontend', 'true');
              core.setOutput('migrations_app', 'true');
              core.setOutput('migrations_auth', 'true');
              return;
            }

            // Backend layout (see CLAUDE.md):
            //   - shared between API and Worker: Core, Data, Domain
            //   - API-only:    Langoose.Api, Langoose.Auth.Data
            //   - Worker-only: Langoose.Worker, Langoose.Corpus.Data
            //   - tools (no runtime deploy): Langoose.DbTool, Langoose.Corpus.DbTool
            // NuGet.Config affects every backend build, so it triggers both.
            const sharedPrefixes = [
              'apps/api/src/Langoose.Core/',
              'apps/api/src/Langoose.Data/',
              'apps/api/src/Langoose.Domain/'
            ];
            const apiPrefixes = [
              'apps/api/src/Langoose.Api/',
              'apps/api/src/Langoose.Auth.Data/'
            ];
            const workerPrefixes = [
              'apps/api/src/Langoose.Worker/',
              'apps/api/src/Langoose.Corpus.Data/'
            ];
            const sharedFiles = ['apps/api/NuGet.Config'];

            const startsWithAny = (f, prefixes) =>
              prefixes.some(p => f.startsWith(p));
            const matchesAny = (f, prefixes, exact = []) =>
              startsWithAny(f, prefixes) || exact.includes(f);

            const sharedTouched = files.some(f => matchesAny(f, sharedPrefixes, sharedFiles));
            const api = sharedTouched || files.some(f => startsWithAny(f, apiPrefixes));
            const worker = sharedTouched || files.some(f => startsWithAny(f, workerPrefixes));
            const frontend = files.some(f => f.startsWith('apps/web/'));

            const dbtoolPrefix = 'apps/api/src/Langoose.DbTool/';
            const migrationsApp = files.some(f => startsWithAny(f, [
              'apps/api/src/Langoose.Data/Migrations/',
              dbtoolPrefix
            ]));
            const migrationsAuth = files.some(f => startsWithAny(f, [
              'apps/api/src/Langoose.Auth.Data/Migrations/',
              dbtoolPrefix
            ]));

            core.setOutput('api', api ? 'true' : 'false');
            core.setOutput('worker', worker ? 'true' : 'false');
            core.setOutput('frontend', frontend ? 'true' : 'false');
            core.setOutput('migrations_app', migrationsApp ? 'true' : 'false');
            core.setOutput('migrations_auth', migrationsAuth ? 'true' : 'false');

  deploy-staging:
    name: Deploy Staging
    needs:
      - ci
      - changes
    if: >-
      needs.changes.outputs.api == 'true'
      || needs.changes.outputs.worker == 'true'
      || needs.changes.outputs.frontend == 'true'
      || needs.changes.outputs.migrations_app == 'true'
      || needs.changes.outputs.migrations_auth == 'true'
    uses: ./.github/workflows/deploy-environment.yml
    with:
      target_environment: staging
      deploy_api: ${{ needs.changes.outputs.api == 'true' }}
      deploy_worker: ${{ needs.changes.outputs.worker == 'true' }}
      deploy_web: ${{ needs.changes.outputs.frontend == 'true' }}
      run_migrations_app: ${{ needs.changes.outputs.migrations_app == 'true' }}
      run_migrations_auth: ${{ needs.changes.outputs.migrations_auth == 'true' }}
    secrets: inherit
