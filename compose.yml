services:
  api:
    build:
      context: .
      dockerfile: apps/api/src/Langoose.Api/Dockerfile
    container_name: langoose-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Langoose: Host=postgres;Port=5432;Database=langoose;Username=langoose;Password=langoose
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: langoose-web
    depends_on:
      api:
        condition: service_started
    environment:
      LANGOOSE_API_BASE_URL: http://localhost:5000
    ports:
      - "5173:80"

  postgres:
    image: postgres:17-alpine
    container_name: langoose-postgres
    environment:
      POSTGRES_DB: langoose
      POSTGRES_USER: langoose
      POSTGRES_PASSWORD: langoose
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langoose -d langoose"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5432:5432"
    volumes:
      - langoose_postgres_data:/var/lib/postgresql/data

volumes:
  langoose_postgres_data:
