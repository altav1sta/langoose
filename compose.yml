services:
  app-api:
    build:
      context: .
      dockerfile: apps/api/src/Langoose.Api/Dockerfile
    container_name: langoose-app-api
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    ports:
      - "5000:8080"

  app-web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: langoose-app-web
    depends_on:
      app-api:
        condition: service_started
    env_file: .env
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 10s
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1 >/dev/null 2>&1 || exit 1"]
      timeout: 5s
    ports:
      - "5173:80"

  app-worker:
    build:
      context: .
      dockerfile: apps/api/src/Langoose.Worker/Dockerfile
    container_name: langoose-app-worker
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env

  e2e:
    build:
      context: ./tests/e2e
      dockerfile: Dockerfile
    command: npm test
    depends_on:
      app-api:
        condition: service_started
      app-web:
        condition: service_healthy
    env_file: .env
    profiles: ["e2e"]

  postgres:
    container_name: langoose-postgres
    env_file: .env
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 10s
      test: ["CMD-SHELL", "pg_isready -U langoose -d langoose"]
      timeout: 5s
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    volumes:
      - ${POSTGRES_DATA_PATH:-langoose_postgres_data}:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro

volumes:
  langoose_postgres_data:
