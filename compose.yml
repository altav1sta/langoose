services:
  api:
    build:
      context: .
      dockerfile: apps/api/src/Langoose.Api/Dockerfile
    container_name: langoose-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__AppDatabase: Host=postgres;Port=5432;Database=langoose_app;Username=langoose;Password=langoose
      ConnectionStrings__AuthDatabase: Host=postgres;Port=5432;Database=langoose_auth;Username=langoose;Password=langoose
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: langoose-web
    depends_on:
      api:
        condition: service_started
    environment:
      LANGOOSE_API_BASE_URL: /api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5173:80"

  e2e:
    profiles: ["e2e"]
    build:
      context: ./tests/e2e
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_healthy
    environment:
      PLAYWRIGHT_BASE_URL: http://web
    command: npm test

  postgres:
    image: postgres:17-alpine
    container_name: langoose-postgres
    environment:
      POSTGRES_USER: langoose
      POSTGRES_PASSWORD: langoose
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langoose -d langoose"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5432:5432"
    volumes:
      - langoose_postgres_data:/var/lib/postgresql/data

volumes:
  langoose_postgres_data:
